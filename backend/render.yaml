services:
  - type: web
    name: skillhub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skillhub-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: '["https://skillhub.meritlives.com"]'

databases:
  - name: skillhub-db
    plan: free
